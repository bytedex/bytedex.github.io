name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Create env file
        env:
          ENV_LOCAL: ${{ secrets.ENV_LOCAL }}
        run: printf '%s\n' "$ENV_LOCAL" > .env.local

      - name: Create data files
        env:
          EXPERIENCE_JSON: ${{ secrets.EXPERIENCE_JSON }}
          ACHIEVEMENTS_JSON: ${{ secrets.ACHIEVEMENTS_JSON }}
        run: |
          mkdir -p data
          printf '%s\n' "$EXPERIENCE_JSON" > data/experience.json
          printf '%s\n' "$ACHIEVEMENTS_JSON" > data/achievements.json

      - run: npx next build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
